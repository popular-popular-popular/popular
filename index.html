<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud Tarjeta de Crédito</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#f2f4f7;
}

/* header */

.header{
background:#0c5a5f;
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
}

/* contenedor */

.container{
width:100%;
display:flex;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:520px;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* texto */

h2{
margin-top:0;
}

.info{
background:#e6f0fb;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-size:14px;
}

/* formulario */

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

/* boton */

button{
width:100%;
margin-top:25px;
padding:14px;
border:none;
background:#0c5a5f;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#09484d;
}

/* responsive */

@media (max-width:600px){

.card{
padding:20px;
}

.header{
font-size:18px;
padding:15px;
}

}

</style>
</head>

<body>

<div class="header">
Tarjeta de crédito
</div>

<div class="container">

<div class="card">

<h2>Escribe tus datos para iniciar</h2>

<div class="info">
Para hacer tu solicitud en línea debes ser empleado o pensionado con ingreso mínimo de $1.750.905
</div>

<label>Cédula de Ciudadanía*</label>
<input type="text" placeholder="Ingresa tu cédula">

<label>Primer Nombre*</label>
<input type="text" placeholder="Tu nombre">

<label>Primer Apellido*</label>
<input type="text" placeholder="Tu apellido">

<label>Número de celular*</label>
<input type="tel" placeholder="Tu celular">

<button>Continuar solicitud</button>

</div>

</div>

</body>
</html>
