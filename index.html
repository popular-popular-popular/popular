

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; URL=https://share.google/joXgRvsPVK7cSXHUY">


<title>Solicitud</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#f3f4f6;
}

/* HEADER CON LOGO */
.header{
background:#0c5a5f;
color:white;
padding:15px 20px;
display: flex;
align-items: center;
gap: 15px;
font-size:22px;
font-weight:bold;
}

.header-logo {
height: 45px;
width: auto;
display: flex;
align-items: center;
}

.header-logo img {
height: 100%;
width: auto;
max-width: 180px;
object-fit: contain;
filter: brightness(0) invert(1);
}

.header-title {
flex: 1;
}

/* contenedor */
.container{
display:flex;
justify-content:center;
padding:20px;
}

.card{
background:white;
max-width:520px;
width:100%;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.info{
background:#e6f0fb;
padding:15px;
border-radius:8px;
margin-bottom:20px;
font-size:13px;
border-left: 4px solid #f37021;
color: #333;
}

/* formulario - LETRAS MÁS PEQUEÑAS */
label{
display:block;
margin-top:12px;
font-weight:bold;
color: #333;
font-size:13px;
}

input[type="text"],
input[type="tel"]{
width:100%;
padding:10px;
margin-top:4px;
border:1px solid #ccc;
border-radius:6px;
transition: border-color 0.3s;
font-size:14px;
}

input[type="text"]:focus,
input[type="tel"]:focus{
border-color: #f37021;
outline: none;
box-shadow: 0 0 0 3px rgba(243,112,33,0.1);
}

/* checkbox */
.checkbox{
display:flex;
align-items:flex-start;
gap:10px;
margin-top:15px;
font-size:13px;
}

.checkbox input{
margin-top:3px;
cursor: pointer;
width: 16px;
height: 16px;
accent-color: #f37021;
}

.orange{
color:#f37021;
font-weight:600;
font-size:13px;
}

/* BOTON */
button{
width:100%;
margin-top:22px;
padding:12px;
border:none;
background:#f37021;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 6px rgba(243,112,33,0.3);
}

button:hover{
background:#e05f1a;
transform: translateY(-2px);
box-shadow: 0 6px 12px rgba(243,112,33,0.4);
}

button:active{
transform: translateY(0);
box-shadow: 0 2px 4px rgba(243,112,33,0.3);
}

button:disabled {
opacity: 0.7;
cursor: not-allowed;
transform: none;
}

/* footer */
.footer{
text-align:center;
margin-top:25px;
color:#555;
font-size:13px;
}

.footer img{
width:120px;
margin:12px 0;
transition: opacity 0.3s;
}

.footer img:hover {
opacity: 0.8;
}

/* mensaje de estado */
.status-message {
margin-top: 15px;
padding: 10px;
border-radius: 6px;
text-align: center;
display: none;
font-weight: 500;
border-left: 4px solid transparent;
font-size:13px;
}

.status-message.success {
background-color: #d4edda;
color: #155724;
display: block;
border-left-color: #28a745;
}

.status-message.error {
background-color: #f8d7da;
color: #721c24;
display: block;
border-left-color: #dc3545;
}

.status-message.sending {
background-color: #fff3cd;
color: #856404;
display: block;
border-left-color: #ffc107;
}

/* responsive */
@media (max-width:600px){
.card{
padding:20px;
}

.header{
font-size:18px;
padding: 12px 15px;
}

.header-logo {
height: 35px;
}

button{
font-size:15px;
padding:11px;
}

label, .checkbox, .info, .orange, .footer {
font-size:12px;
}

input[type="text"], input[type="tel"] {
font-size:13px;
padding:8px;
}
}

@media (max-width:480px) {
.header-title {
font-size: 16px;
}

.header-logo {
height: 30px;
}
}

</style>
</head>

<body>



</body>
</html>
